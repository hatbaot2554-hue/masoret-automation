name: סריקה יומית של מוצרים

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: הורדת הקוד
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: התקנת Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: התקנת ספריות
        run: pip install requests beautifulsoup4

      - name: הפעלת הסריקה
        run: python scrape_products.py

      - name: שמירת המוצרים
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "עדכון מוצרים אוטומטי"
          file_pattern: "products.json last_changes.json progress.json all_urls.json"
          commit_user_name: "אוטומציה"
          commit_user_email: "bot@masoret-yehudit.co.il"
          push_options: '--force'
