name: סריקה יומית של מוצרים

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: הורדת הקוד
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: התקנת Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: התקנת ספריות
        run: pip install requests beautifulsoup4

      - name: הפעלת הסריקה
        run: python scrape_products.py

      - name: שמירת המוצרים
        run: |
          git config user.name "אוטומציה"
          git config user.email "bot@masoret-yehudit.co.il"
          git pull --rebase origin main || true
          git add products.json progress.json all_urls.json || true
          git diff --staged --quiet || git commit -m "עדכון מוצרים אוטומטי"
          git push --force origin main || true
